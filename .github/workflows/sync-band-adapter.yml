name: Sync band/adapter with main

# Keep the Band payload branch current. Whenever main advances (most often an
# upstream NanoClaw merge landing in the fork), rebase the band/adapter payload
# onto the new main and force-push, so band/adapter stays a clean, 0-behind,
# single-payload overlay — never accumulating merge commits.
#
# band/adapter is, by design, main + only the additive Band-owned files (the
# /add-band skill copies them and supplies deps at install time). Rebasing the
# payload onto main only replays those additive commits over main's own changes —
# it never touches main's files and should never conflict. If it ever does — or
# the result stops being a clean additive, skills-free overlay — the job fails
# loudly and leaves band/adapter untouched for a human. It deliberately does NOT
# build/typecheck: the payload is an overlay, not an independently buildable tree
# (the Band deps live in the skill's install step, not in band/adapter's
# package.json).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two syncs race on pushing band/adapter.
concurrency:
  group: sync-band-adapter
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: band/adapter
          fetch-depth: 0

      - name: Rebase band/adapter payload onto main (additive overlay only)
        run: |
          set -euo pipefail
          git config user.name  "band-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main band/adapter

          BASE=origin/main

          # Already current? nothing to do.
          behind=$(git rev-list --count HEAD..$BASE)
          if [ "$behind" -eq 0 ]; then
            echo "band/adapter already contains origin/main — nothing to sync."
            exit 0
          fi
          echo "band/adapter is $behind commit(s) behind main — rebasing payload onto $BASE."

          # Replay the payload commits onto main's tip. Abort on ANY conflict —
          # never auto-resolve the payload.
          if ! git rebase "$BASE"; then
            git rebase --abort || true
            echo "::error::Rebasing band/adapter onto main hit a conflict. Resolve by hand; band/adapter left untouched."
            exit 1
          fi

          # The rebased result must still be a clean additive overlay on main.
          if git diff --name-status "$BASE" HEAD | grep -vE '^A'; then
            echo "::error::After rebase, band/adapter is no longer purely additive vs main (offending paths above). Not pushing."
            exit 1
          fi
          if git diff --name-only "$BASE" HEAD -- .claude/skills/ | grep -q .; then
            echo "::error::After rebase, band/adapter touches .claude/skills/. Not pushing."
            exit 1
          fi

          # Rebase rewrites the payload commits, so the push must be a force —
          # guarded by --force-with-lease against the ref we fetched, plus the
          # concurrency group above, so a racing sync can't be silently clobbered.
          git push --force-with-lease=band/adapter origin HEAD:band/adapter
          echo "band/adapter rebased onto main ($(git rev-parse --short "$BASE")) and pushed."
